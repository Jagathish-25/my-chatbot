<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatGPT Clone Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===================== GLOBAL ===================== */
body{
margin:0;
font-family:Arial;
background:#0d0d0f;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* ===================== SIDEBAR ===================== */
.sidebar{
width:260px;
background:#17171a;
padding:15px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:10px;
}

.sidebar button{
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2a2a2e;
color:white;
}

.sidebar button:hover{
background:#3a3a40;
}

/* ===================== CHAT ===================== */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

/* TOP BAR */
.top{
padding:12px;
background:#17171a;
border-bottom:1px solid #2a2a2e;
}

/* CHAT BOX */
#box{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGE */
.msg{
max-width:70%;
padding:10px 14px;
border-radius:12px;
line-height:1.4;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:#0084ff;
}

.bot{
align-self:flex-start;
background:#2a2a2e;
}

/* INPUT */
.input{
display:flex;
padding:12px;
background:#17171a;
gap:10px;
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#2a2a2e;
color:white;
outline:none;
}

.input button{
padding:12px 16px;
border:none;
border-radius:8px;
background:#0084ff;
color:white;
cursor:pointer;
}

/* COPY BUTTON */
.copy{
font-size:10px;
opacity:0.7;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🤖 AI Chat</h2>
<button onclick="clearChat()">Clear Chat</button>
<button onclick="newChat()">New Chat</button>
</div>

<!-- CHAT -->
<div class="chat">

<div class="top">ChatGPT Clone Pro Max</div>

<div id="box"></div>

<div class="input">
<input id="inp" placeholder="Ask anything...">
<button onclick="voice()">🎤</button>
<button onclick="send()">Send</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

const box = document.getElementById("box");
const inp = document.getElementById("inp");

/* ---------------- MESSAGE RENDER ---------------- */

function add(role,text){

let d=document.createElement("div");
d.className="msg "+role;

/* Markdown support */
d.innerHTML = marked.parse(text);

/* COPY BUTTON */
let copy=document.createElement("div");
copy.className="copy";
copy.innerText="copy";
copy.onclick=()=>navigator.clipboard.writeText(text);

d.appendChild(copy);

box.appendChild(d);
box.scrollTop=box.scrollHeight;

}

/* ---------------- STREAM SEND ---------------- */

async function send(){

let msg=inp.value.trim();
if(!msg) return;

add("user",msg);
inp.value="";

let bot=document.createElement("div");
bot.className="msg bot";
bot.innerHTML="...";

box.appendChild(bot);

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

const reader=res.body.getReader();
const decoder=new TextDecoder();

let full="";

while(true){

const {value,done}=await reader.read();
if(done) break;

let chunk=decoder.decode(value);
full+=chunk;

bot.innerHTML = marked.parse(full);
box.scrollTop=box.scrollHeight;

}

}

/* ---------------- VOICE INPUT ---------------- */

function voice(){

let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="en-US";

rec.start();

rec.onresult=function(e){
inp.value=e.results[0][0].transcript;
};

}

/* ---------------- HISTORY ---------------- */

async function load(){

let res=await fetch("/history");
let data=await res.json();

data.forEach(m=>{
add(m[0]=="user"?"user":"bot",m[1]);
});

}

/* ---------------- CLEAR ---------------- */

async function clearChat(){
await fetch("/clear",{method:"POST"});
box.innerHTML="";
}

/* ---------------- NEW CHAT ---------------- */

async function newChat(){
await fetch("/newchat");
box.innerHTML="";
}

load();

</script>
</body>
</html>
